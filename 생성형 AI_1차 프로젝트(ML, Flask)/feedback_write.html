{% extends "base.html" %}
{% block title %}문의 및 제안 작성{% endblock %}

{% block content %}
<div class="feedback-page">

    <section class="feedback-hero">
        <h2>문의 및 제안 작성</h2>
        <p>문의사항이나 제안을 입력해 주세요.</p>
    </section>

    <div class="feedback-list-wrap">
        <div class="feedback-card">
            <form method="post" action="/feedback/write" class="feedback-form">

                {% if message %}
                <div class="feedback-form-error">
                    {{ message }}
                </div>
                {% endif %}

                <div class="feedback-form-row">
                    <label for="user_name">이름</label>
                    <input type="text" id="user_name" name="user_name" required>
                </div>

                <div class="feedback-form-row">
                    <label for="user_email">이메일</label>
                    <input type="email" id="user_email" name="user_email" required>
                </div>

                <div class="feedback-form-row">
                    <label for="feedback_type">구분</label>
                    <select id="feedback_type" name="feedback_type" required>
                        <option value="">선택하세요</option>
                        <option value="문의">문의</option>
                        <option value="제안">제안</option>
                    </select>
                </div>

                <div class="feedback-form-row">
                    <label for="title">제목</label>
                    <input type="text" id="title" name="title" required>
                </div>

                <div class="feedback-form-row">
                    <label for="content">내용</label>
                    <textarea id="content" name="content" rows="8" required></textarea>
                </div>

                <div class="feedback-form-actions">
                    <a href="/feedback/list" class="feedback-cancel-btn">목록으로</a>
                    <button type="submit" class="feedback-submit-btn">등록하기</button>
                </div>

            </form>
        </div>
    </div>

</div>
{% endblock %}
