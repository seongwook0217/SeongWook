{% extends "base.html" %}

{% block title %}로그인{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <h2>로그인</h2>
        <p class="auth-desc">서비스 이용을 위해 로그인해주세요.</p>

        {% if message %}
            <p class="auth-message error">{{ message }}</p>
        {% endif %}

        <form class="auth-form" action="{{ url_for('login') }}" method="post">
            <div class="form-group">
                <label for="user_id">아이디</label>
                <input type="text" id="user_id" name="user_id" placeholder="아이디를 입력하세요">
            </div>

            <div class="form-group">
                <label for="user_pw">비밀번호</label>
                <input type="password" id="user_pw" name="user_pw" placeholder="비밀번호를 입력하세요">
            </div>

            <button type="submit" class="auth-submit-btn">로그인</button>
        </form>

        <div class="auth-links">
            <a href="/signup">회원가입</a>
        </div>
    </div>
</div>
{% endblock %}
