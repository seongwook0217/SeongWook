{% extends "base.html" %}

{% block title %}회원가입{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <h2>회원가입</h2>
        <p class="auth-desc">회원 정보를 입력하여 계정을 생성하세요.</p>

        {% if message %}
            <p class="auth-message error">{{ message }}</p>
        {% endif %}

        <form class="auth-form" action="{{ url_for('signup') }}" method="post">
            <div class="form-group">
                <label for="user_id">아이디</label>
                <input type="text" id="user_id" name="user_id" placeholder="아이디를 입력하세요" required>
            </div>

            <div class="form-group">
                <label for="user_name">이름</label>
                <input type="text" id="user_name" name="user_name" placeholder="이름을 입력하세요" required>
            </div>

            <div class="form-group">
                <label for="user_email">이메일</label>
                <input type="email" id="user_email" name="user_email" placeholder="이메일을 입력하세요" required>
            </div>

            <div class="form-group">
                <label for="user_pw">비밀번호</label>
                <input type="password" id="user_pw" name="user_pw" placeholder="비밀번호를 입력하세요" required>
            </div>

            <div class="form-group">
                <label for="user_pw_check">비밀번호 확인</label>
                <input type="password" id="user_pw_check" name="user_pw_check" placeholder="비밀번호를 다시 입력하세요" required>
            </div>

            <button type="submit" class="auth-submit-btn">회원가입</button>
        </form>

        <div class="auth-links">
            <a href="/login">로그인으로 이동</a>
        </div>
    </div>
</div>
{% endblock %}
